<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Street — 3D Konfigurator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#546158;--cream:#F8F6F1;--border:rgba(84,97,88,0.2);--muted:rgba(84,97,88,0.5);--text:#2c322e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--text);font-family:'Montserrat',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:Georgia,serif;font-size:16px;letter-spacing:.2em;color:var(--green);text-transform:uppercase;}
.hstats{display:flex;gap:14px;}
.stat{border:1px solid var(--border);padding:6px 12px;text-align:center;}
.stat strong{display:block;font-family:Georgia,serif;font-size:16px;color:var(--green);line-height:1.1;}
.stat span{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.main{display:grid;grid-template-columns:275px 1fr;flex:1;overflow:hidden;}
.list-panel{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.list-top{padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.slabel{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.htabs,.ftabs{display:flex;border:1px solid var(--border);margin-bottom:7px;}
.htab,.ftab{flex:1;padding:6px 2px;background:transparent;border:none;border-right:1px solid var(--border);font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s;}
.htab:last-child,.ftab:last-child{border-right:none;}
.htab:hover,.ftab:hover{color:var(--green);}
.htab.on,.ftab.on{background:var(--green);color:var(--cream);}
.ftabs{margin-bottom:0;}
.list-scroll{overflow-y:auto;flex:1;}
.arow{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative;}
.arow::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;}
.arow.frei::before{background:var(--green);}
.arow.reserviert::before{background:#b8956a;}
.arow.vermietet::before{background:#b0ada8;}
.arow:hover,.arow.on{background:rgba(84,97,88,0.06);}
.arow .nr{font-family:Georgia,serif;font-size:15px;color:var(--green);line-height:1;}
.arow.reserviert .nr{color:#b8956a;}
.arow.vermietet .nr{color:#b0ada8;}
.arow .meta{font-size:9px;color:var(--muted);line-height:1.5;}
.arow .meta b{display:block;font-size:10px;color:var(--text);font-weight:500;}
.arow .chf{font-size:9px;color:var(--green);text-align:right;white-space:nowrap;}
.legend{display:flex;gap:14px;padding:9px 16px;border-top:1px solid var(--border);flex-shrink:0;}
.leg{display:flex;align-items:center;gap:5px;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.pip{width:7px;height:7px;border-radius:1px;}
.pip.f{background:var(--green);}.pip.r{background:#b8956a;}.pip.v{background:#b0ada8;}
.iso-panel{position:relative;overflow:hidden;background:var(--cream);cursor:grab;}
.iso-panel:active{cursor:grabbing;}
.iso-container{position:absolute;transform-origin:0 0;}
.iso-svg{display:block;}
.apt{cursor:pointer;transition:filter .18s,opacity .18s;}
.iso-container.dimmed .apt{opacity:0.35;}
.iso-container.dimmed .apt.lit{opacity:1;filter:brightness(1.4) saturate(1.2);}
.apt.selected{filter:brightness(1.45) saturate(1.3);}
.iso-tooltip{position:absolute;pointer-events:none;background:rgba(248,246,241,0.97);border:1px solid var(--border);padding:14px 16px;min-width:190px;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;box-shadow:0 4px 24px rgba(0,0,0,0.1);z-index:10;}
.iso-tooltip.show{opacity:1;transform:translateY(0);}
.tt-nr{font-family:Georgia,serif;font-size:24px;color:var(--green);line-height:1;}
.tt-name{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.tt-status{display:inline-block;border:1px solid;padding:3px 8px;font-size:7px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
.tt-status.frei{border-color:var(--green);color:var(--green);}
.tt-status.reserviert{border-color:#b8956a;color:#b8956a;}
.tt-status.vermietet{border-color:#b0ada8;color:#b0ada8;}
.tt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tt-item label{font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px;}
.tt-item value{font-family:Georgia,serif;font-size:16px;color:var(--green);}
.tt-item value small{font-family:'Montserrat',sans-serif;font-size:9px;color:var(--muted);}
.tt-cta{display:block;margin-top:12px;padding:9px;background:var(--green);color:var(--cream);border:none;font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;width:100%;text-align:center;transition:background .18s;}
.tt-cta:hover{background:#3d4840;}
.tt-cta.wait{background:#b8956a;}
.tt-cta:disabled{background:#b0ada8;cursor:not-allowed;}
.floor-legend{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:4px;background:rgba(248,246,241,0.9);border:1px solid var(--border);padding:10px 12px;}
.fl-item{display:flex;align-items:center;gap:7px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;padding:3px 0;transition:color .15s;}
.fl-item:hover{color:var(--green);}
.fl-item.active{color:var(--green);font-weight:500;}
.fl-dot{width:8px;height:8px;border-radius:1px;background:rgba(84,97,88,0.25);flex-shrink:0;}
.fl-item.active .fl-dot{background:var(--green);}
.zoom-ctrl{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:3px;}
.zb{width:28px;height:28px;background:rgba(248,246,241,0.95);border:1px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--green);transition:background .15s;font-family:'Montserrat',sans-serif;}
.zb:hover{background:rgba(84,97,88,0.1);}
.hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);pointer-events:none;opacity:0.7;}
</style>
</head>

const SL = {"frei":"Verfügbar","reserviert":"Reserviert","vermietet":"Vermietet"};
const FLOORS = ["EG","1.OG","2.OG","AG"];
let activeHouse="11",activeFloor="EG",selectedId=null;
let sc=1,px=0,py=0,drag=false,lm={x:0,y:0};

document.getElementById("sf").textContent=Object.values(APTS).filter(a=>a.status==="frei").length;
document.getElementById("sr").textContent=Object.values(APTS).filter(a=>a.status==="reserviert").length;

function fitSvg(){
  const panel=document.getElementById("iso-panel");
  const pw=panel.clientWidth,ph=panel.clientHeight;
  const sw=2189_JS,sh=1458_JS;
  sc=Math.min(pw/sw,ph/sh)*0.9;
  px=(pw-sw*sc)/2; py=(ph-sh*sc)/2;
  applyT();
}
function applyT(){
  const c=document.getElementById("iso-container");
  c.style.transform=`translate(${px}px,${py}px) scale(${sc})`;
  c.style.transformOrigin="0 0";
}
function zoom(f){
  const p=document.getElementById("iso-panel");
  const pw=p.clientWidth,ph=p.clientHeight;
  sc=Math.max(0.15,Math.min(4,sc*f));
  px=pw/2-(pw/2-px)*f; py=ph/2-(ph/2-py)*f;
  applyT();
}
function resetZoom(){fitSvg();}

const panel=document.getElementById("iso-panel");
panel.addEventListener("mousedown",e=>{if(e.target.closest(".apt"))return;drag=true;lm={x:e.clientX,y:e.clientY};});
window.addEventListener("mousemove",e=>{if(!drag)return;px+=e.clientX-lm.x;py+=e.clientY-lm.y;lm={x:e.clientX,y:e.clientY};applyT();});
window.addEventListener("mouseup",()=>{drag=false;});
panel.addEventListener("wheel",e=>{e.preventDefault();zoom(e.deltaY<0?1.12:0.89);},{passive:false});

function litApt(id){
  const cont=document.getElementById("iso-container");
  cont.classList.add("dimmed");
  document.querySelectorAll(".apt").forEach(e=>e.classList.remove("lit"));
  if(id) document.querySelectorAll(".apt-"+id.replace(".","_")).forEach(e=>e.classList.add("lit"));
}
function clearLit(){
  document.getElementById("iso-container").classList.remove("dimmed");
  document.querySelectorAll(".apt").forEach(e=>e.classList.remove("lit"));
  if(selectedId) document.querySelectorAll(".apt-"+selectedId.replace(".","_")).forEach(e=>e.classList.add("lit","selected"));
}

document.querySelectorAll(".apt").forEach(el=>{
  el.addEventListener("mouseenter",e=>{
    const id=el.dataset.apt;
    litApt(id);
    showTT(id,e);
    document.querySelectorAll(".arow").forEach(r=>r.classList.toggle("on",r.dataset.id===id));
  });
  el.addEventListener("mousemove",e=>moveTT(e));
  el.addEventListener("mouseleave",()=>{
    clearLit();
    hideTT();
    document.querySelectorAll(".arow").forEach(r=>r.classList.toggle("on",r.dataset.id===selectedId));
  });
  el.addEventListener("click",e=>{
    const id=el.dataset.apt;
    selectedId=(selectedId===id)?null:id;
    document.querySelectorAll(".apt").forEach(e=>e.classList.remove("selected"));
    if(selectedId){
      document.querySelectorAll(".apt-"+selectedId.replace(".","_")).forEach(e=>e.classList.add("selected"));
      const a=APTS[selectedId];
      if(a){setHouse(a.house,null);activeFloor=a.floor;renderList();}
    }
  });
});

function showTT(id,e){
  const a=APTS[id];if(!a)return;
  document.getElementById("tt-nr").textContent=id;
  document.getElementById("tt-name").textContent=a.rooms_count+"-Zimmer-Wohnung";
  const ts=document.getElementById("tt-status");ts.className="tt-status "+a.status;ts.textContent=SL[a.status];
  document.getElementById("tt-size").innerHTML=a.size+' <small>m²</small>';
  document.getElementById("tt-rooms").innerHTML=a.rooms_count+' <small>Zi.</small>';
  document.getElementById("tt-floor").textContent=a.floor;
  document.getElementById("tt-rent").innerHTML=a.status==="vermietet"?'<small style="font-size:10px">Vermietet</small>':a.rent.toLocaleString("de-CH")+' <small>CHF</small>';
  document.getElementById("tt-out").innerHTML=a.outdoor+'<br><small style="font-family:Montserrat;font-size:9px">'+a.outdoor_m+' m²</small>';
  document.getElementById("tt-bezug").innerHTML='<small style="font-family:Montserrat;font-size:9px">'+a.bezug+'</small>';
  const cta=document.getElementById("tt-cta");
  if(a.status==="vermietet"){cta.textContent="Bereits vermietet";cta.disabled=true;cta.classList.remove("wait");}
  else if(a.status==="reserviert"){cta.textContent="Warteliste anfragen";cta.disabled=false;cta.classList.add("wait");}
  else{cta.textContent="Besichtigung anfragen";cta.disabled=false;cta.classList.remove("wait");}
  moveTT(e);
  document.getElementById("tooltip").classList.add("show");
}
function moveTT(e){
  const tt=document.getElementById("tooltip");
  const pr=panel.getBoundingClientRect();
  let x=e.clientX-pr.left+18,y=e.clientY-pr.top-tt.offsetHeight/2;
  if(x+210>pr.width)x=e.clientX-pr.left-215;
  if(y<8)y=8;
  if(y+tt.offsetHeight>pr.height-8)y=pr.height-tt.offsetHeight-8;
  tt.style.left=x+"px";tt.style.top=y+"px";
}
function hideTT(){document.getElementById("tooltip").classList.remove("show");}
function doContact(){
  const id=document.getElementById("tt-nr").textContent;
  const a=APTS[id];if(!a)return;
  alert("Anfrage für Wohnung "+id+"\n("+a.rooms_count+" Zi., "+a.size+" m², "+a.rent.toLocaleString("de-CH")+" CHF/Mt.)\n\ninfo@livingstreet.ch");
}

function filterFloor(fl,btn){
  document.querySelectorAll(".fl-item").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".apt").forEach(el=>{
    el.style.display=fl==="all"||el.dataset.floor===fl?"":"none";
  });
}

function renderList(){
  const ft=document.getElementById("ftabs");ft.innerHTML="";
  FLOORS.forEach(fl=>{
    const b=document.createElement("button");
    b.className="ftab"+(fl===activeFloor?" on":"");
    b.textContent=fl;b.onclick=()=>{activeFloor=fl;renderList();};
    ft.appendChild(b);
  });
  const el=document.getElementById("list");el.innerHTML="";
  Object.entries(APTS).filter(([id,a])=>a.house===activeHouse&&a.floor===activeFloor)
    .sort((x,y)=>x[0].localeCompare(y[0]))
    .forEach(([id,a])=>{
      const row=document.createElement("div");
      row.className="arow "+a.status+(selectedId===id?" on":"");
      row.dataset.id=id;
      row.innerHTML='<div class="nr">'+id+'</div><div class="meta"><b>'+a.rooms_count+'-Zi. · '+a.size+' m²</b>'+a.outdoor+' · '+a.outdoor_m+' m²</div><div class="chf">'+(a.status==="vermietet"?"Vermietet":a.rent.toLocaleString("de-CH")+" CHF")+'</div>';
      row.addEventListener("mouseenter",()=>{litApt(id);});
      row.addEventListener("mouseleave",()=>{clearLit();});
      row.addEventListener("click",()=>{
        selectedId=(selectedId===id)?null:id;
        document.querySelectorAll(".apt").forEach(e=>e.classList.remove("selected"));
        if(selectedId) document.querySelectorAll(".apt-"+selectedId.replace(".","_")).forEach(e=>e.classList.add("selected"));
        renderList();
      });
      el.appendChild(row);
    });
}

function setHouse(h,btn){
  activeHouse=h;activeFloor="EG";
  document.querySelectorAll(".htab").forEach(b=>b.classList.remove("on"));
  if(btn)btn.classList.add("on");
  else document.querySelectorAll(".htab").forEach(b=>{if(b.textContent.includes(h))b.classList.add("on");});
  renderList();
  document.querySelectorAll(".apt").forEach(el=>el.style.opacity=el.dataset.house===h?"1":"0.25");
}

fitSvg();
window.addEventListener("resize",fitSvg);
renderList();
</script>
