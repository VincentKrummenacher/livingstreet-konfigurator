<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Street — Wohnungskonfigurator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#546158;--c:#F8F6F1;--b:rgba(84,97,88,0.2);--m:rgba(84,97,88,0.5);--t:#2c322e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--c);color:var(--t);font-family:'Montserrat',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{padding:14px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:Georgia,serif;font-size:15px;letter-spacing:.2em;color:var(--g);text-transform:uppercase;}
.sub{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--m);margin-top:2px;}
.hstats{display:flex;gap:12px;}
.stat{border:1px solid var(--b);padding:6px 12px;text-align:center;}
.stat strong{display:block;font-family:Georgia,serif;font-size:15px;color:var(--g);line-height:1.1;}
.stat span{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--m);}
.main{display:grid;grid-template-columns:270px 1fr;flex:1;overflow:hidden;}
.lp{display:flex;flex-direction:column;border-right:1px solid var(--b);overflow:hidden;}
.lt{padding:11px 14px 9px;border-bottom:1px solid var(--b);flex-shrink:0;}
.sl{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--m);margin-bottom:5px;margin-top:8px;}
.sl:first-child{margin-top:0;}
.ft{display:flex;border:1px solid var(--b);margin-bottom:2px;}
.fb{flex:1;min-width:0;padding:5px 2px;background:transparent;border:none;border-right:1px solid var(--b);font-family:'Montserrat',sans-serif;font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--m);cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fb:last-child{border-right:none;}.fb:hover{color:var(--g);}.fb.on{background:var(--g);color:var(--c);}
.ls{overflow-y:auto;flex:1;}
.ar{display:grid;grid-template-columns:50px 1fr auto;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .12s;position:relative;}
.ar::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;}
.ar.frei::before{background:var(--g);}.ar.reserviert::before{background:#b8956a;}.ar.vermietet::before{background:#b0ada8;}
.ar:hover,.ar.on{background:rgba(84,97,88,0.06);}
.ar .nr{font-family:Georgia,serif;font-size:14px;color:var(--g);line-height:1;}
.ar.reserviert .nr{color:#b8956a;}.ar.vermietet .nr{color:#b0ada8;}
.ar .me{font-size:9px;color:var(--m);line-height:1.5;}
.ar .me b{display:block;font-size:10px;color:var(--t);font-weight:500;}
.ar .ch{font-size:9px;color:var(--g);text-align:right;white-space:nowrap;line-height:1.5;}
.ar.vermietet .ch{color:#b0ada8;}
.leg{display:flex;gap:12px;padding:8px 14px;border-top:1px solid var(--b);flex-shrink:0;}
.li{display:flex;align-items:center;gap:5px;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);}
.pi{width:7px;height:7px;border-radius:1px;}
.pi.f{background:var(--g);}.pi.r{background:#b8956a;}.pi.v{background:#b0ada8;}
.ip{position:relative;overflow:hidden;background:var(--c);cursor:grab;user-select:none;}
.ip:active{cursor:grabbing;}
.ic{position:absolute;transform-origin:0 0;will-change:transform;}
.apt{cursor:pointer;transition:opacity .18s,filter .18s;}
.dimmed .apt{opacity:0.18;}
.dimmed .apt.lit{opacity:1;filter:brightness(1.3) saturate(1.1);}
.apt.sel{filter:brightness(1.4) saturate(1.2);}
.tt{position:absolute;pointer-events:none;background:rgba(248,246,241,0.97);border:1px solid var(--b);padding:14px 16px;min-width:200px;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;box-shadow:0 4px 20px rgba(0,0,0,0.1);z-index:20;}
.tt.show{opacity:1;transform:translateY(0);}
.tt-nr{font-family:Georgia,serif;font-size:22px;color:var(--g);line-height:1;}
.tt-nm{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--m);margin-bottom:6px;}
.tt-or{font-size:9px;color:var(--m);margin-bottom:8px;}
.tt-st{display:inline-block;border:1px solid;padding:3px 8px;font-size:7px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
.tt-st.frei{border-color:var(--g);color:var(--g);}.tt-st.reserviert{border-color:#b8956a;color:#b8956a;}.tt-st.vermietet{border-color:#b0ada8;color:#b0ada8;}
.tt-gr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.tt-it label{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);display:block;margin-bottom:2px;}
.tt-it value{font-family:Georgia,serif;font-size:15px;color:var(--g);}
.tt-it value small{font-family:'Montserrat',sans-serif;font-size:9px;color:var(--m);}
.tt-miete{background:rgba(84,97,88,0.06);padding:8px 10px;margin-bottom:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.tt-mi label{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);display:block;margin-bottom:1px;}
.tt-mi value{font-family:Georgia,serif;font-size:13px;color:var(--g);}
.tt-bt{display:block;padding:9px;background:var(--g);color:var(--c);border:none;font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;width:100%;text-align:center;transition:background .18s;}
.tt-bt:hover{background:#3d4840;}.tt-bt.wait{background:#b8956a;}.tt-bt:disabled{background:#b0ada8;cursor:not-allowed;}
.fl{position:absolute;top:14px;right:14px;background:rgba(248,246,241,0.93);border:1px solid var(--b);padding:10px 12px;min-width:110px;}
.fli{display:flex;align-items:center;gap:6px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);cursor:pointer;padding:3px 0;transition:color .15s;}
.fli:hover{color:var(--g);}.fli.on{color:var(--g);font-weight:500;}
.fld{width:8px;height:8px;border-radius:1px;background:rgba(84,97,88,0.2);flex-shrink:0;}
.fli.on .fld{background:var(--g);}
.fl-lbl{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--m);margin-bottom:5px;}
.zc{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:3px;}
.zb{width:28px;height:28px;background:rgba(248,246,241,0.95);border:1px solid var(--b);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g);}
.zb:hover{background:rgba(84,97,88,0.1);}
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);pointer-events:none;white-space:nowrap;}
.no-results{padding:24px 14px;text-align:center;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);}
</style>

door": "Dachterrasse", "outdoor_m": 38, "status": "reserviert"}, "15.14": {"house": "15", "floor": "AG", "rooms": "4.5", "size": 113, "orient": "Mitte", "netto": 2040, "nk": 200, "brutto": 2240, "outdoor": "Dachterrasse", "outdoor_m": 32, "status": "frei"}, "15.15": {"house": "15", "floor": "AG", "rooms": "4.5", "size": 122, "orient": "Nord", "netto": 2240, "nk": 200, "brutto": 2440, "outdoor": "Dachterrasse", "outdoor_m": 35, "status": "frei"}};
const SL={"frei":"Verfügbar","reserviert":"Reserviert","vermietet":"Vermietet"};
const FLOORS=["EG","1.OG","2.OG","AG"];
const SIZES=["2.5","3.5","4.5","5.5"];
let ah="all",af="all",az="all",sid=null,hid=null;
let sc=1,px=0,py=0,drag=false,lm={x:0,y:0};

document.getElementById("sf").textContent=Object.values(A).filter(a=>a.status==="frei").length;
document.getElementById("sr").textContent=Object.values(A).filter(a=>a.status==="reserviert").length;

function fit(){const p=document.getElementById("ip"),sw=2598,sh=1727;sc=Math.min(p.clientWidth/sw,p.clientHeight/sh)*0.88;px=(p.clientWidth-sw*sc)/2;py=(p.clientHeight-sh*sc)/2;apT();}
function apT(){document.getElementById("ic").style.transform=`translate(${px}px,${py}px) scale(${sc})`;}
function zm(f){const p=document.getElementById("ip");sc=Math.max(0.1,Math.min(5,sc*f));px=p.clientWidth/2-(p.clientWidth/2-px)*f;py=p.clientHeight/2-(p.clientHeight/2-py)*f;apT();}
function rz(){fit();}

const ip=document.getElementById("ip");
ip.addEventListener("mousedown",e=>{if(e.target.closest(".apt"))return;drag=true;lm={x:e.clientX,y:e.clientY};});
window.addEventListener("mousemove",e=>{if(!drag)return;px+=e.clientX-lm.x;py+=e.clientY-lm.y;lm={x:e.clientX,y:e.clientY};apT();});
window.addEventListener("mouseup",()=>drag=false);
ip.addEventListener("wheel",e=>{e.preventDefault();zm(e.deltaY<0?1.12:0.89);},{passive:false});

function lit(id){
  document.getElementById("ic").classList.add("dimmed");
  document.querySelectorAll(".apt").forEach(e=>e.classList.remove("lit"));
  if(id)document.querySelectorAll(".apt-"+id.replace(".","_")).forEach(e=>e.classList.add("lit"));
}
function clr(){
  document.getElementById("ic").classList.remove("dimmed");
  document.querySelectorAll(".apt").forEach(e=>e.classList.remove("lit","sel"));
  if(sid){
    document.getElementById("ic").classList.add("dimmed");
    document.querySelectorAll(".apt-"+sid.replace(".","_")).forEach(e=>e.classList.add("lit","sel"));
  }
}

document.querySelectorAll(".apt").forEach(el=>{
  el.addEventListener("mouseenter",e=>{hid=el.dataset.apt;lit(hid);showTT(hid,e);hlL(hid);});
  el.addEventListener("mousemove",e=>mvTT(e));
  el.addEventListener("mouseleave",()=>{hid=null;clr();hideTT();hlL(sid);});
  el.addEventListener("click",()=>{
    const id=el.dataset.apt;
    sid=(sid===id)?null:id;
    document.querySelectorAll(".apt").forEach(e=>e.classList.remove("sel"));
    if(sid){
      document.querySelectorAll(".apt-"+sid.replace(".","_")).forEach(e=>e.classList.add("sel"));
      const a=A[sid];
      if(a){ah=a.house;af=a.floor;az="all";syncTabs();rl();}
    }
    hlL(sid);
  });
});

function fmt(n){return n?n.toLocaleString("de-CH"):"—";}

function showTT(id,e){
  const a=A[id];if(!a)return;
  document.getElementById("tt-nr").textContent=id;
  document.getElementById("tt-nm").textContent=a.rooms+"-Zimmer-Wohnung";
  document.getElementById("tt-or").textContent="Ausrichtung: "+a.orient;
  const ts=document.getElementById("tt-st");ts.className="tt-st "+a.status;ts.textContent=SL[a.status];
  document.getElementById("tt-sz").innerHTML=a.size+' <small>m²</small>';
  document.getElementById("tt-rm").innerHTML=a.rooms+' <small>Zi.</small>';
  document.getElementById("tt-fl").textContent=a.floor;
  document.getElementById("tt-ot").innerHTML=a.outdoor+'<br><small style="font-size:9px">'+a.outdoor_m+' m²</small>';
  document.getElementById("tt-nt").innerHTML='<small>CHF </small>'+fmt(a.netto);
  document.getElementById("tt-nk").innerHTML='<small>CHF </small>'+fmt(a.nk);
  document.getElementById("tt-br").innerHTML='<small>CHF </small>'+fmt(a.brutto);
  const bt=document.getElementById("tt-bt");
  if(a.status==="vermietet"){bt.textContent="Bereits vermietet";bt.disabled=true;bt.classList.remove("wait");}
  else if(a.status==="reserviert"){bt.textContent="Warteliste anfragen";bt.disabled=false;bt.classList.add("wait");}
  else{bt.textContent="Besichtigung anfragen";bt.disabled=false;bt.classList.remove("wait");}
  mvTT(e);
  document.getElementById("tt").classList.add("show");
}
function mvTT(e){
  const tt=document.getElementById("tt"),r=ip.getBoundingClientRect();
  let x=e.clientX-r.left+16,y=e.clientY-r.top-tt.offsetHeight/2;
  if(x+220>r.width)x=e.clientX-r.left-225;
  if(y<6)y=6;
  if(y+tt.offsetHeight>r.height-6)y=r.height-tt.offsetHeight-6;
  tt.style.left=x+"px";tt.style.top=y+"px";
}
function hideTT(){document.getElementById("tt").classList.remove("show");}
function doC(){
  const id=document.getElementById("tt-nr").textContent;
  const a=A[id];if(!a)return;
  alert("Anfrage für Wohnung "+id+"\n"+a.rooms+" Zi. · "+a.size+" m²\nNettomiete: CHF "+fmt(a.netto)+"\nNebenkosten: CHF "+fmt(a.nk)+"\nBruttomiete: CHF "+fmt(a.brutto)+"\n\ninfo@livingstreet.ch");
}

function ffl(fl,btn){
  document.querySelectorAll(".fli").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  document.querySelectorAll(".apt").forEach(el=>{
    const show=fl==="all"||el.dataset.floor===fl;
    el.style.opacity=show?"":"0";
    el.style.pointerEvents=show?"":"none";
  });
}

function hlL(id){
  document.querySelectorAll(".ar").forEach(r=>r.classList.toggle("on",r.dataset.id===id));
  if(id){const el=document.querySelector('.ar[data-id="'+id+'"]');if(el)el.scrollIntoView({block:'nearest'});}
}

function matches(id,a){
  if(ah!=="all"&&a.house!==ah)return false;
  if(af!=="all"&&a.floor!==af)return false;
  if(az!=="all"&&a.rooms!==az)return false;
  return true;
}

function syncTabs(){
  document.querySelectorAll("#htabs .fb").forEach(b=>b.classList.toggle("on",b.dataset.val===ah));
  document.querySelectorAll("#ftabs .fb").forEach(b=>b.classList.toggle("on",b.dataset.val===af));
  document.querySelectorAll("#ztabs .fb").forEach(b=>b.classList.toggle("on",b.dataset.val===az));
}

function applyHouseViz(){
  document.querySelectorAll(".apt").forEach(el=>{
    if(ah==="all"){el.style.opacity="";el.style.pointerEvents="";}
    else{const show=el.dataset.house===ah;el.style.opacity=show?"":"0.12";el.style.pointerEvents=show?"":"none";}
  });
}

function buildTabs(){
  const ht=document.getElementById("htabs");
  [["all","Alle"],["11","Haus 11"],["13","Haus 13"],["15","Haus 15"]].forEach(([v,l])=>{
    const b=document.createElement("button");
    b.className="fb"+(ah===v?" on":"");b.textContent=l;b.dataset.val=v;
    b.onclick=()=>{ah=v;syncTabs();applyHouseViz();rl();};
    ht.appendChild(b);
  });
  const ft=document.getElementById("ftabs");
  [["all","Alle"],...FLOORS.map(f=>[f,f])].forEach(([v,l])=>{
    const b=document.createElement("button");
    b.className="fb"+(af===v?" on":"");b.textContent=l;b.dataset.val=v;
    b.onclick=()=>{af=v;syncTabs();rl();};
    ft.appendChild(b);
  });
  const zt=document.getElementById("ztabs");
  [["all","Alle"],...SIZES.map(s=>[s,s+" Zi."])].forEach(([v,l])=>{
    const b=document.createElement("button");
    b.className="fb"+(az===v?" on":"");b.textContent=l;b.dataset.val=v;
    b.onclick=()=>{az=v;syncTabs();rl();};
    zt.appendChild(b);
  });
}

function rl(){
  const el=document.getElementById("list");el.innerHTML="";
  const filtered=Object.entries(A).filter(([id,a])=>matches(id,a)).sort((x,y)=>x[0].localeCompare(y[0]));
  if(!filtered.length){el.innerHTML='<div class="no-results">Keine Wohnungen gefunden</div>';return;}
  filtered.forEach(([id,a])=>{
    const row=document.createElement("div");
    row.className="ar "+a.status+(sid===id?" on":"");
    row.dataset.id=id;
    row.innerHTML=
      '<div class="nr">'+id+'</div>'+
      '<div class="me"><b>'+a.rooms+'-Zi. · '+a.size+' m²</b>'+a.orient+' · '+a.floor+'</div>'+
      '<div class="ch">'+(a.status==="vermietet"
        ? "Vermietet"
        : 'CHF '+fmt(a.netto)+'<br><small style="font-size:8px;color:var(--m)">+ CHF '+fmt(a.nk)+' NK</small>'
      )+'</div>';
    row.addEventListener("mouseenter",()=>lit(id));
    row.addEventListener("mouseleave",()=>clr());
    row.addEventListener("click",()=>{
      sid=(sid===id)?null:id;
      document.querySelectorAll(".apt").forEach(e=>e.classList.remove("sel"));
      if(sid)document.querySelectorAll(".apt-"+sid.replace(".","_")).forEach(e=>e.classList.add("sel"));
      rl();
    });
    el.appendChild(row);
  });
}

fit();
window.addEventListener("resize",fit);
buildTabs();
rl();
</script>
