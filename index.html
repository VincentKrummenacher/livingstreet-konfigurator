<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Street — 3D Konfigurator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#546158;--c:#F8F6F1;--b:rgba(84,97,88,0.2);--m:rgba(84,97,88,0.5);--t:#2c322e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--c);color:var(--t);font-family:'Montserrat',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{padding:14px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:Georgia,serif;font-size:15px;letter-spacing:.2em;color:var(--g);text-transform:uppercase;}
.sub{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--m);margin-top:2px;}
.hstats{display:flex;gap:12px;}
.stat{border:1px solid var(--b);padding:6px 12px;text-align:center;}
.stat strong{display:block;font-family:Georgia,serif;font-size:15px;color:var(--g);line-height:1.1;}
.stat span{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--m);}
.main{display:grid;grid-template-columns:260px 1fr;flex:1;overflow:hidden;}
/* LIST */
.lp{display:flex;flex-direction:column;border-right:1px solid var(--b);overflow:hidden;}
.lt{padding:11px 14px 9px;border-bottom:1px solid var(--b);flex-shrink:0;}
.sl{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--m);margin-bottom:6px;}
.ht,.ft{display:flex;border:1px solid var(--b);margin-bottom:7px;}
.hb,.fb{flex:1;padding:6px 2px;background:transparent;border:none;border-right:1px solid var(--b);font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);cursor:pointer;transition:all .15s;}
.hb:last-child,.fb:last-child{border-right:none;}
.hb:hover,.fb:hover{color:var(--g);}
.hb.on,.fb.on{background:var(--g);color:var(--c);}
.ft{margin-bottom:0;}
.ls{overflow-y:auto;flex:1;}
.ar{display:grid;grid-template-columns:46px 1fr auto;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .12s;position:relative;}
.ar::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;}
.ar.frei::before{background:var(--g);}
.ar.reserviert::before{background:#b8956a;}
.ar.vermietet::before{background:#b0ada8;}
.ar:hover,.ar.on{background:rgba(84,97,88,0.06);}
.ar .nr{font-family:Georgia,serif;font-size:14px;color:var(--g);line-height:1;}
.ar.reserviert .nr{color:#b8956a;}
.ar.vermietet .nr{color:#b0ada8;}
.ar .me{font-size:9px;color:var(--m);line-height:1.5;}
.ar .me b{display:block;font-size:10px;color:var(--t);font-weight:500;}
.ar .ch{font-size:9px;color:var(--g);text-align:right;white-space:nowrap;}
.ar.vermietet .ch{color:#b0ada8;}
.leg{display:flex;gap:12px;padding:8px 14px;border-top:1px solid var(--b);flex-shrink:0;}
.li{display:flex;align-items:center;gap:5px;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);}
.pi{width:7px;height:7px;border-radius:1px;}
.pi.f{background:var(--g);}.pi.r{background:#b8956a;}.pi.v{background:#b0ada8;}
/* ISO */
.ip{position:relative;overflow:hidden;background:var(--c);cursor:grab;user-select:none;}
.ip:active{cursor:grabbing;}
.ic{position:absolute;transform-origin:0 0;will-change:transform;}
.apt{cursor:pointer;}
.apt{transition:filter .2s,opacity .2s;}
.dimmed .apt{opacity:0.3;}
.dimmed .apt.lit{opacity:1;filter:brightness(1.35) saturate(1.15);}
.apt.sel{filter:brightness(1.45) saturate(1.25);}
/* TOOLTIP */
.tt{position:absolute;pointer-events:none;background:rgba(248,246,241,0.97);border:1px solid var(--b);padding:14px 16px;min-width:185px;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;box-shadow:0 4px 20px rgba(0,0,0,0.1);z-index:20;}
.tt.show{opacity:1;transform:translateY(0);}
.tt-nr{font-family:Georgia,serif;font-size:22px;color:var(--g);line-height:1;}
.tt-nm{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--m);margin-bottom:8px;}
.tt-st{display:inline-block;border:1px solid;padding:3px 8px;font-size:7px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;}
.tt-st.frei{border-color:var(--g);color:var(--g);}
.tt-st.reserviert{border-color:#b8956a;color:#b8956a;}
.tt-st.vermietet{border-color:#b0ada8;color:#b0ada8;}
.tt-gr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tt-it label{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);display:block;margin-bottom:2px;}
.tt-it value{font-family:Georgia,serif;font-size:15px;color:var(--g);}
.tt-it value small{font-family:'Montserrat',sans-serif;font-size:9px;color:var(--m);}
.tt-bt{display:block;margin-top:11px;padding:9px;background:var(--g);color:var(--c);border:none;font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;width:100%;text-align:center;transition:background .18s;}
.tt-bt:hover{background:#3d4840;}
.tt-bt.wait{background:#b8956a;}
.tt-bt:disabled{background:#b0ada8;cursor:not-allowed;}
/* FLOOR LEGEND */
.fl{position:absolute;top:14px;right:14px;background:rgba(248,246,241,0.93);border:1px solid var(--b);padding:10px 12px;}
.fli{display:flex;align-items:center;gap:6px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);cursor:pointer;padding:3px 0;transition:color .15s;}
.fli:hover{color:var(--g);}
.fli.on{color:var(--g);font-weight:500;}
.fld{width:8px;height:8px;border-radius:1px;background:rgba(84,97,88,0.2);flex-shrink:0;}
.fli.on .fld{background:var(--g);}
.fl-lbl{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--m);margin-bottom:5px;}
/* ZOOM */
.zc{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:3px;}
.zb{width:28px;height:28px;background:rgba(248,246,241,0.95);border:1px solid var(--b);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g);}
.zb:hover{background:rgba(84,97,88,0.1);}
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);pointer-events:none;white-space:nowrap;}
</style>
</head>

const SL={"frei":"Verfügbar","reserviert":"Reserviert","vermietet":"Vermietet"};
const FL=["EG","1.OG","2.OG","AG"];
let ah="11",af="EG",sid=null,hid=null;
let sc=1,px=0,py=0,drag=false,lm={x:0,y:0};

document.getElementById("sf").textContent=Object.values(A).filter(a=>a.status==="frei").length;
document.getElementById("sr").textContent=Object.values(A).filter(a=>a.status==="reserviert").length;

// Fit
function fit(){
  const p=document.getElementById("ip");
  const sw=2441_JS,sh=1655_JS;
  sc=Math.min(p.clientWidth/sw,p.clientHeight/sh)*0.88;
  px=(p.clientWidth-sw*sc)/2;
  py=(p.clientHeight-sh*sc)/2;
  apT();
}
function apT(){
  document.getElementById("ic").style.transform=`translate(${px}px,${py}px) scale(${sc})`;
}
function zm(f){
  const p=document.getElementById("ip");
  sc=Math.max(0.1,Math.min(5,sc*f));
  px=p.clientWidth/2-(p.clientWidth/2-px)*f;
  py=p.clientHeight/2-(p.clientHeight/2-py)*f;
  apT();
}
function rz(){fit();}

// Pan
const ip=document.getElementById("ip");
ip.addEventListener("mousedown",e=>{if(e.target.closest(".apt"))return;drag=true;lm={x:e.clientX,y:e.clientY};});
window.addEventListener("mousemove",e=>{if(!drag)return;px+=e.clientX-lm.x;py+=e.clientY-lm.y;lm={x:e.clientX,y:e.clientY};apT();});
window.addEventListener("mouseup",()=>{drag=false;});
ip.addEventListener("wheel",e=>{e.preventDefault();zm(e.deltaY<0?1.12:0.89);},{passive:false});

// Lighting
function lit(id){
  const ic=document.getElementById("ic");
  ic.classList.add("dimmed");
  document.querySelectorAll(".apt").forEach(e=>e.classList.remove("lit"));
  if(id) document.querySelectorAll(".apt-"+id.replace(".","_")).forEach(e=>e.classList.add("lit"));
}
function clr(){
  document.getElementById("ic").classList.remove("dimmed");
  document.querySelectorAll(".apt").forEach(e=>e.classList.remove("lit"));
  if(sid){
    document.querySelectorAll(".apt-"+sid.replace(".","_")).forEach(e=>{e.classList.add("lit","sel");});
    document.getElementById("ic").classList.add("dimmed");
  }
}

// Apt events
document.querySelectorAll(".apt").forEach(el=>{
  el.addEventListener("mouseenter",e=>{
    hid=el.dataset.apt;
    lit(hid);
    showTT(hid,e);
    hlList(hid);
  });
  el.addEventListener("mousemove",e=>mvTT(e));
  el.addEventListener("mouseleave",()=>{
    hid=null;
    clr();
    hideTT();
    hlList(sid);
  });
  el.addEventListener("click",()=>{
    const id=el.dataset.apt;
    sid=(sid===id)?null:id;
    document.querySelectorAll(".apt").forEach(e=>e.classList.remove("sel"));
    if(sid){
      document.querySelectorAll(".apt-"+sid.replace(".","_")).forEach(e=>e.classList.add("sel"));
      const a=A[sid];
      if(a){setH(a.house,null);af=a.floor;rl();}
    }
    hlList(sid);
  });
});

function showTT(id,e){
  const a=A[id];if(!a)return;
  document.getElementById("tt-nr").textContent=id;
  document.getElementById("tt-nm").textContent=a.rooms_count+"-Zimmer-Wohnung";
  const ts=document.getElementById("tt-st");ts.className="tt-st "+a.status;ts.textContent=SL[a.status];
  document.getElementById("tt-sz").innerHTML=a.size+' <small>m²</small>';
  document.getElementById("tt-rm").innerHTML=a.rooms_count+' <small>Zi.</small>';
  document.getElementById("tt-fl").textContent=a.floor;
  document.getElementById("tt-rt").innerHTML=a.status==="vermietet"?'<small style="font-size:10px">Vermietet</small>':a.rent.toLocaleString("de-CH")+' <small>CHF</small>';
  document.getElementById("tt-ot").innerHTML=a.outdoor+'<br><small style="font-size:9px">'+a.outdoor_m+' m²</small>';
  document.getElementById("tt-bz").innerHTML='<small style="font-size:9px">'+a.bezug+'</small>';
  const bt=document.getElementById("tt-bt");
  if(a.status==="vermietet"){bt.textContent="Bereits vermietet";bt.disabled=true;bt.classList.remove("wait");}
  else if(a.status==="reserviert"){bt.textContent="Warteliste anfragen";bt.disabled=false;bt.classList.add("wait");}
  else{bt.textContent="Besichtigung anfragen";bt.disabled=false;bt.classList.remove("wait");}
  mvTT(e);
  document.getElementById("tt").classList.add("show");
}
function mvTT(e){
  const tt=document.getElementById("tt");
  const r=ip.getBoundingClientRect();
  let x=e.clientX-r.left+16,y=e.clientY-r.top-tt.offsetHeight/2;
  if(x+200>r.width)x=e.clientX-r.left-205;
  if(y<6)y=6;
  if(y+tt.offsetHeight>r.height-6)y=r.height-tt.offsetHeight-6;
  tt.style.left=x+"px";tt.style.top=y+"px";
}
function hideTT(){document.getElementById("tt").classList.remove("show");}
function doC(){
  const id=document.getElementById("tt-nr").textContent;
  const a=A[id];if(!a)return;
  alert("Anfrage für Wohnung "+id+"\n("+a.rooms_count+" Zi., "+a.size+" m², "+a.rent.toLocaleString("de-CH")+" CHF/Mt.)\n\ninfo@livingstreet.ch");
}

function ffl(fl,btn){
  document.querySelectorAll(".fli").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  document.querySelectorAll(".apt").forEach(el=>{
    el.style.display=fl==="all"||el.dataset.floor===fl?"":"none";
  });
}

function hlList(id){
  document.querySelectorAll(".ar").forEach(r=>r.classList.toggle("on",r.dataset.id===id));
}

function rl(){
  const ft=document.getElementById("ftabs");ft.innerHTML="";
  FL.forEach(fl=>{
    const b=document.createElement("button");
    b.className="fb"+(fl===af?" on":"");
    b.textContent=fl;b.onclick=()=>{af=fl;rl();};
    ft.appendChild(b);
  });
  const el=document.getElementById("list");el.innerHTML="";
  Object.entries(A).filter(([id,a])=>a.house===ah&&a.floor===af)
    .sort((x,y)=>x[0].localeCompare(y[0]))
    .forEach(([id,a])=>{
      const row=document.createElement("div");
      row.className="ar "+a.status+(sid===id?" on":"");
      row.dataset.id=id;
      row.innerHTML='<div class="nr">'+id+'</div><div class="me"><b>'+a.rooms_count+'-Zi. · '+a.size+' m²</b>'+a.outdoor+' · '+a.outdoor_m+' m²</div><div class="ch">'+(a.status==="vermietet"?"Vermietet":a.rent.toLocaleString("de-CH")+" CHF")+'</div>';
      row.addEventListener("mouseenter",()=>{lit(id);});
      row.addEventListener("mouseleave",()=>{clr();});
      row.addEventListener("click",()=>{
        sid=(sid===id)?null:id;
        document.querySelectorAll(".apt").forEach(e=>e.classList.remove("sel"));
        if(sid) document.querySelectorAll(".apt-"+sid.replace(".","_")).forEach(e=>e.classList.add("sel"));
        rl();
      });
      el.appendChild(row);
    });
}

function setH(h,btn){
  ah=h;af="EG";
  document.querySelectorAll(".hb").forEach(b=>b.classList.remove("on"));
  if(btn)btn.classList.add("on");
  else document.querySelectorAll(".hb").forEach(b=>{if(b.textContent.includes(h))b.classList.add("on");});
  rl();
  document.querySelectorAll(".apt").forEach(el=>{
    el.style.opacity=el.dataset.house===h?"1":"0.2";
  });
}

fit();
window.addEventListener("resize",fit);
rl();
</script>
